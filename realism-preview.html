<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Breadboard Builder - realism preview</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #23232a; color: #e8e6df; }
  .bar { display:flex; align-items:center; gap:14px; padding:12px 18px; background:#1a1a1f; border-bottom:1px solid #33333c; }
  .bar h1 { font-size:15px; margin:0; font-weight:600; }
  .tag { font-size:11px; background:#3a3a44; padding:2px 7px; border-radius:6px; color:#b9b6ad; }
  .note { font-size:12px; color:#9a978d; margin-left:auto; }
  main { padding:22px; overflow:auto; }
  svg { width:100%; max-width:1100px; height:auto; display:block; background:#2c2c34; border-radius:12px; }
</style>
</head>
<body>
<div class="bar">
  <h1>Breadboard Builder</h1><span class="tag">realism preview</span>
  <span class="note">same single-file SVG approach, drawn realistically</span>
</div>
<main>
<svg id="scene" viewBox="0 0 1080 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Realistic breadboard with Arduino and LED">
  <defs>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfcf8"/>
      <stop offset="1" stop-color="#e7e3d2"/>
    </linearGradient>
    <linearGradient id="holeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2eede"/>
      <stop offset="1" stop-color="#c9c3af"/>
    </linearGradient>
    <radialGradient id="ledGrad" cx="0.36" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#ff9c9c"/>
      <stop offset="0.35" stop-color="#ef3c3c"/>
      <stop offset="0.78" stop-color="#c81d1d"/>
      <stop offset="1" stop-color="#8c1212"/>
    </radialGradient>
    <linearGradient id="pcbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13a3aa"/>
      <stop offset="1" stop-color="#067079"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfb"/>
      <stop offset="0.5" stop-color="#cfcfcf"/>
      <stop offset="1" stop-color="#8f8f8f"/>
    </linearGradient>
    <linearGradient id="resGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3c084"/>
      <stop offset="0.5" stop-color="#cda35f"/>
      <stop offset="1" stop-color="#b0853f"/>
    </linearGradient>
    <linearGradient id="usbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaeaea"/>
      <stop offset="1" stop-color="#9a9a9a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.6" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <filter id="softbig" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
</svg>
</main>
<script>
(function(){
  'use strict';
  var NS='http://www.w3.org/2000/svg';
  var svg=document.getElementById('scene');
  function E(name,attrs,parent){
    var n=document.createElementNS(NS,name);
    if(attrs)for(var k in attrs)n.setAttribute(k,attrs[k]);
    (parent||svg).appendChild(n);
    return n;
  }
  function T(x,y,str,attrs,parent){
    var t=E('text',Object.assign({x:x,y:y,'font-family':'monospace','font-size':10,fill:'#7d7868'},attrs||{}),parent);
    t.textContent=str; return t;
  }

  // ---------- breadboard ----------
  var PITCH=20, COLS=30, x0=70;
  var board=E('g');
  // body
  E('rect',{x:34,y:30,width:760,height:300,rx:12,fill:'url(#boardGrad)',stroke:'#cfc9b4','stroke-width':1.5,filter:'url(#softbig)'},board);
  // vertical y positions
  var yTP=58, yTM=80;                 // top rails + / -
  var rowsTop={a:120,b:140,c:160,d:180,e:200};
  var ravineY=210, ravineH=24;
  var rowsBot={f:236,g:256,h:276,i:296,j:316};
  // (no bottom rails in this close-up to keep it clean)
  // center channel
  E('rect',{x:40,y:ravineY,width:748,height:ravineH,fill:'#e0dbc8'},board);
  E('line',{x1:40,y1:ravineY+1,x2:788,y2:ravineY+1,stroke:'#cdc7b2','stroke-width':1},board);
  // rail stripes
  E('line',{x1:54,y1:yTP-9,x2:780,y2:yTP-9,stroke:'#d23','stroke-width':2,opacity:0.55},board);
  E('line',{x1:54,y1:yTM+9,x2:780,y2:yTM+9,stroke:'#2a6fd6','stroke-width':2,opacity:0.55},board);
  T(46,yTP,'+',{fill:'#d23','font-weight':'bold','text-anchor':'end'},board);
  T(46,yTM,'-',{fill:'#2a6fd6','font-weight':'bold','text-anchor':'end'},board);

  function socket(cx,cy){
    var g=E('g',null,board);
    E('rect',{x:cx-4,y:cy-4,width:8,height:8,rx:2,fill:'url(#holeGrad)',stroke:'#b3ad98','stroke-width':0.8},g);
    E('rect',{x:cx-1.7,y:cy-1.7,width:3.4,height:3.4,rx:0.8,fill:'#6c6757'},g);
    return g;
  }
  function colX(c){ return x0+(c-1)*PITCH; }

  // main grid holes
  var letters=['a','b','c','d','e'], lettersB=['f','g','h','i','j'];
  for(var c=1;c<=COLS;c++){
    var cx=colX(c);
    letters.forEach(function(r){ socket(cx,rowsTop[r]); });
    lettersB.forEach(function(r){ socket(cx,rowsBot[r]); });
    if(c===1||c%5===0){ T(cx,rowsTop.a-14,String(c),{'text-anchor':'middle'},board); T(cx,rowsBot.j+16,String(c),{'text-anchor':'middle'},board); }
  }
  // rail holes (clusters of 5)
  function railRow(y){ var idx=0; for(var grp=0;grp<5;grp++){ for(var k=0;k<5;k++){ socket(x0+(grp*6+k)*PITCH, y); idx++; } } }
  railRow(yTP); railRow(yTM);
  // row letters
  letters.forEach(function(r){ T(54,rowsTop[r],r,{'text-anchor':'end'},board); T(792,rowsTop[r],r,{'text-anchor':'start'},board); });
  lettersB.forEach(function(r){ T(54,rowsBot[r],r,{'text-anchor':'end'},board); T(792,rowsBot[r],r,{'text-anchor':'start'},board); });

  // ---------- a glossy red LED in columns 20 (legs in c=19 and c=21, top half) ----------
  function drawLED(colA,colB,row){
    var ax=colX(colA), bx=colX(colB), hy=rowsTop[row];
    var g=E('g',null,svg);
    var baseY=hy-26, midX=(ax+bx)/2, domeCy=baseY-12;
    // legs
    E('line',{x1:ax,y1:hy,x2:midX-7,y2:baseY,stroke:'url(#metalGrad)','stroke-width':2.6,'stroke-linecap':'round'},g);
    E('line',{x1:bx,y1:hy,x2:midX+7,y2:baseY,stroke:'url(#metalGrad)','stroke-width':2.6,'stroke-linecap':'round'},g);
    // base flange
    E('rect',{x:midX-15,y:baseY-6,width:30,height:10,rx:3,fill:'#e9e9e9',stroke:'#bdbdbd','stroke-width':0.8},g);
    // cylindrical body + dome
    E('path',{d:'M '+(midX-15)+' '+(baseY-4)+' L '+(midX-15)+' '+(domeCy)+' A 15 15 0 0 1 '+(midX+15)+' '+(domeCy)+' L '+(midX+15)+' '+(baseY-4)+' Z',
      fill:'url(#ledGrad)',stroke:'#7c1010','stroke-width':0.8,filter:'url(#soft)'},g);
    E('circle',{cx:midX,cy:domeCy,r:15,fill:'url(#ledGrad)',stroke:'#7c1010','stroke-width':0.8},g);
    // gloss highlight
    E('ellipse',{cx:midX-5,cy:domeCy-6,rx:5.5,ry:8,fill:'#ffffff',opacity:0.55,transform:'rotate(-18 '+(midX-5)+' '+(domeCy-6)+')'},g);
    E('circle',{cx:midX,cy:domeCy,r:21,fill:'#ff5a5a',opacity:0.12},g); // faint glow
    return g;
  }

  // ---------- resistor (horizontal, between two top-half holes) ----------
  function drawResistor(colA,colB,row,bands){
    var ax=colX(colA), bx=colX(colB), hy=rowsTop[row];
    var g=E('g',null,svg);
    var bodyY=hy-30, bodyX1=ax+6, bodyX2=bx-6, w=bodyX2-bodyX1;
    E('line',{x1:ax,y1:hy,x2:ax,y2:bodyY,stroke:'url(#metalGrad)','stroke-width':2.4,'stroke-linecap':'round'},g);
    E('line',{x1:bx,y1:hy,x2:bx,y2:bodyY,stroke:'url(#metalGrad)','stroke-width':2.4,'stroke-linecap':'round'},g);
    E('line',{x1:ax,y1:bodyY,x2:bx,y2:bodyY,stroke:'url(#metalGrad)','stroke-width':2.4},g);
    E('rect',{x:bodyX1,y:bodyY-10,width:w,height:20,rx:10,fill:'url(#resGrad)',stroke:'#8a6a30','stroke-width':0.9,filter:'url(#soft)'},g);
    bands.forEach(function(col,i){ E('rect',{x:bodyX1+10+i*9,y:bodyY-10,width:4,height:20,fill:col},g); });
    return g;
  }

  // ---------- jumper wire (bowed) ----------
  function wire(x1,y1,x2,y2,color,bow){
    var mx=(x1+x2)/2, my=(y1+y2)/2-(bow||26);
    var d='M '+x1+' '+y1+' Q '+mx+' '+my+' '+x2+' '+y2;
    E('path',{d:d,fill:'none',stroke:'#00000040','stroke-width':6,'stroke-linecap':'round'}); // shadow
    E('path',{d:d,fill:'none',stroke:color,'stroke-width':4,'stroke-linecap':'round'});
    E('circle',{cx:x1,cy:y1,r:3.2,fill:color,stroke:'#00000030'});
    E('circle',{cx:x2,cy:y2,r:3.2,fill:color,stroke:'#00000030'});
  }

  // ---------- stylized Arduino UNO ----------
  function drawArduino(x,y){
    var g=E('g',null,svg);
    E('rect',{x:x,y:y,width:330,height:200,rx:10,fill:'url(#pcbGrad)',stroke:'#045158','stroke-width':1.4,filter:'url(#softbig)'},g);
    // silk border
    E('rect',{x:x+8,y:y+8,width:314,height:184,rx:6,fill:'none',stroke:'#ffffff','stroke-width':0.7,opacity:0.35},g);
    // mounting holes
    [[x+16,y+16],[x+314,y+16],[x+16,y+184],[x+314,y+184]].forEach(function(p){ E('circle',{cx:p[0],cy:p[1],r:5,fill:'#2c2c2c',stroke:'#d9d9d9','stroke-width':1.4},g); });
    // header strips with pin sockets
    function header(hx,hy,n,label){
      E('rect',{x:hx,y:hy,width:n*13+8,height:18,rx:3,fill:'#1c1c1c'},g);
      for(var i=0;i<n;i++){ E('rect',{x:hx+5+i*13,y:hy+4,width:9,height:9,rx:1.5,fill:'#3a3a3a',stroke:'#0a0a0a','stroke-width':0.6},g); }
      if(label) T(hx+2,hy-4,label,{fill:'#ffffff',opacity:0.7,'font-size':8},g);
      return hx;
    }
    var topH=header(x+70,y+14,18,'DIGITAL (PWM~)');
    var botH=header(x+150,y+168,12,'');
    header(x+40,y+168,6,'ANALOG IN');
    // USB connector (left top, protruding)
    E('rect',{x:x-14,y:y+30,width:30,height:42,rx:3,fill:'url(#usbGrad)',stroke:'#888','stroke-width:':1},g);
    // barrel power jack (left bottom)
    E('rect',{x:x-12,y:y+118,width:30,height:34,rx:5,fill:'#101010',stroke:'#333','stroke-width':1},g);
    E('circle',{cx:x-2,cy:y+135,r:6,fill:'#2a2a2a',stroke:'#555'},g);
    // main IC (ATmega)
    E('rect',{x:x+150,y:y+92,width:120,height:34,rx:3,fill:'#161616'},g);
    E('circle',{cx:x+158,cy:y+109,r:3,fill:'#333'},g);
    // a few SMD parts
    E('rect',{x:x+70,y:y+96,width:22,height:14,rx:2,fill:'#0d0d0d'},g);
    E('rect',{x:x+104,y:y+96,width:14,height:14,rx:2,fill:'#c9a23a'},g); // crystal-ish
    // power LEDs
    E('rect',{x:x+44,y:y+96,width:7,height:5,rx:1,fill:'#37d04a'},g);
    E('rect',{x:x+44,y:y+106,width:7,height:5,rx:1,fill:'#ffb020'},g);
    // silk text
    T(x+150,y+150,'ARDUINO',{fill:'#ffffff',opacity:0.85,'font-size':16,'font-weight':'bold','font-family':'system-ui'},g);
    T(x+150,y+165,'UNO',{fill:'#ffffff',opacity:0.7,'font-size':11,'font-family':'system-ui'},g);
    return {g:g, pin13:{x:x+75,y:y+14}, gnd:{x:x+75+13*8,y:y+14}, fivev:{x:x+155,y:y+186}};
  }

  // place parts
  var ard=drawArduino(360,388);
  drawResistor(12,15,'b',['#b23','#b23','#5b3a1e','#d4af37']);   // cols 12-15 row b
  drawLED(19,21,'b');                                             // LED legs cols 19 & 21 row b

  // wires: D13 -> resistor left col; LED cathode col -> arduino GND ; plus a power rail wire
  wire(ard.pin13.x, ard.pin13.y, colX(12), rowsTop.a, '#1f9d3a', 60);   // signal to resistor
  wire(colX(21), rowsTop.a, ard.gnd.x, ard.gnd.y, '#111', 70);          // LED to GND
  wire(colX(2), yTP, colX(7), rowsTop.a, '#d11', 15);                   // short + rail to row jumper (tidy)
})();
</script>
</body>
</html>
